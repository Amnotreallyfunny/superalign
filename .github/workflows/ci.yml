name: Scientific Validation CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  scientific-validation:
    name: Scientific Validation (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: 1. Contract Validation
        run: cargo test -p superalign-schemas --lib contracts

      - name: 2. Invariant Validation
        run: cargo test -p superalign-schemas --lib invariants

      - name: 3. Property-Based Noise Resilience
        run: cargo test -p taxonomy-engine --lib property_tests

      - name: 4. Distributed Determinism
        run: cargo test -p matrix-engine --lib determinism_tests

      - name: 5. Full Workspace Test
        # Skipping superalign-core due to PyO3 linking issues in standard cargo test
        run: |
          cargo test -p core-parser
          cargo test -p taxonomy-engine
          cargo test -p matrix-engine
          cargo test -p provenance-core
          cargo test -p plugin-runtime
          cargo test -p superalign-schemas

  python-validation:
    name: Orchestration Validation (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install maturin and dependencies
        run: |
          pip install maturin ruff mypy pytest pyarrow pandas
      
      - name: Lint and Format
        run: |
          ruff check .
          mypy python/superalign

      - name: Build Bindings
        run: |
          pip install .
        env:
          PYO3_PYTHON: python3

      - name: Run Pytest
        run: pytest
